    section {

    .lp-card.available:hover {

      transform: translateY(-3px);

      justify-content: space-between;
    }

    .lp-num {

      font-weight: 700;
      padding: 3px 10px;
      border-radius: 50px;
      letter-spacing: 0.04em;
    }

    .lp-badge.available {
      background: rgba(34,197,94,0.1);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.2);

    .lp-badge.soon {
      background: rgba(255,255,255,0.05);

      border: 1px solid var(--border);

    .lp-arrow {

  <script>
    function toggleDropdown(btn) {
      const isOpen = btn.classList.contains('open');
      document.querySelectorAll('.lessons-dropdown-btn').forEach(b => b.classList.remove('open'));
      document.querySelectorAll('.lessons-dropdown-menu').forEach(m => m.classList.remove('open'));
      if (!isOpen) {
        btn.classList.add('open');
        document.getElementById('lessons-dropdown').classList.add('open');
      }
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.lessons-dropdown-wrap')) {
        document.querySelectorAll('.lessons-dropdown-btn').forEach(b => b.classList.remove('open'));
        document.querySelectorAll('.lessons-dropdown-menu').forEach(m => m.classList.remove('open'));
      }
    });</script>

  <script>
    // Dynamisches Trend-Widget laden
    async function loadTrendWidget() {
      const CAT_COLORS = {
        'Comfort Food': {c:'#f97316',bg:'rgba(249,115,22,0.1)'},
        'Health':       {c:'#22c55e',bg:'rgba(34,197,94,0.1)'},
        'Asian Fusion': {c:'#a855f7',bg:'rgba(168,85,247,0.1)'},
        'Dessert':      {c:'#ec4899',bg:'rgba(236,72,153,0.1)'},
        'Snacks':       {c:'#f59e0b',bg:'rgba(245,158,11,0.1)'},
        'Meal Prep':    {c:'#2563ff',bg:'rgba(37,99,255,0.1)'},
        'General Food': {c:'#8894b0',bg:'rgba(136,148,176,0.1)'},
      };

      const SCORE_COLOR = (s) => s >= 85 ? '#22c55e' : s >= 70 ? '#f59e0b' : '#8894b0';

      try {
        const resp = await fetch('trends.json?t=' + Date.now());
        if (!resp.ok) throw new Error('not found');
        const data = await resp.json();

        // KW berechnen
        const d = new Date(data.updated);
        const startOfYear = new Date(d.getFullYear(), 0, 1);
        const kw = Math.ceil(((d - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
        document.getElementById('trend-kw').textContent = `KW ${kw} / ${d.getFullYear()}`;

        const grid = document.getElementById('trend-mini-grid');
        grid.innerHTML = '';

        data.trends.slice(0, 5).forEach((t, i) => {
          const cat = CAT_COLORS[t.category] || CAT_COLORS['General Food'];
          const scoreColor = SCORE_COLOR(t.score);
          grid.innerHTML += `
            <a href="agent_dashboard.html" class="trend-mini-card">
              <div class="trend-mini-rank">#${i+1} · ${t.category.toUpperCase()}</div>
              <div class="trend-mini-name">${t.name}</div>
              <div class="trend-mini-bar-bg">
                <div class="trend-mini-bar-fill" style="width:${t.score}%;background:linear-gradient(90deg,${cat.c},${scoreColor})"></div>
              </div>
              <div class="trend-mini-score" style="color:${scoreColor}">${t.score} / 100</div>
            </a>`;
        });

      } catch(e) {
        // Fallback wenn trends.json nicht erreichbar
        document.getElementById('trend-mini-grid').innerHTML =
          '<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--text-muted);font-size:0.85rem;">⚠️ Trends werden gerade aktualisiert...</div>';
      }
    }

    loadTrendWidget();
  </script>



  <script>
  (function() {
    var LL = [
      {id:1,  t:"Richtig prompten",              u:"lektion-01.html", k:["einsteiger","anfänger","start","prompt","schreiben","grundlagen","neu","erste mal","womit anfangen"], tk:"🟢", tm:"15 Min"},

      {id:3,  t:"ChatGPT vs Claude vs Perplexity",u:"lektion-03.html", k:["welches tool","chatgpt","claude","perplexity","vergleich","unterschied","welche ki"], tk:"🟢", tm:"7 Min"},

      {id:6,  t:"Erster KI-Agent",                u:"lektion-06.html", k:["agent","automatisch","selbstständig","bauen","fortgeschritten","automatisier"], tk:"🔵", tm:"10 Min"},
      {id:7,  t:"GitHub Actions",                 u:"lektion-07.html", k:["github","cron","python","programmier","technisch","automatisier","schedule"], tk:"🟠", tm:"15 Min"},
      {id:8,  t:"KI-Inhalte erkennen",            u:"lektion-08.html", k:["erkennen","fake","deepfake","bild","video","vertrauen","echt","manipuliert"], tk:"🟢", tm:"10 Min"},
      {id:9,  t:"Claude in Word",                 u:"lektion-09.html", k:["word","mitschrift","protokoll","dokument","büro","office","besprechung"], tk:"🔵", tm:"10 Min"},
      {id:10, t:"Foto-Agent",                     u:"lektion-10.html", k:["foto","fotos","iphone","sortieren","organisieren","bilder","galerie","album"], tk:"🟠", tm:"20 Min"},
      {id:11, t:"E-Mail Assistent",               u:"lektion-11.html", k:["email","e-mail","mail","antwort","schreiben","postfach","outlook","gmail","korrespondenz"], tk:"🟢", tm:"10 Min"},
    ];

    var busy = false;

    function addMsg(role, html) {
      var win = document.getElementById('awin');
      var d = document.createElement('div');
      d.className = 'amsg ' + (role === 'bot' ? 'b' : 'u');
      var av = document.createElement('div');
      av.className = 'aav ' + (role === 'bot' ? 'b' : 'u');
      av.textContent = role === 'bot' ? '🤖' : '😊';
      var bl = document.createElement('div');
      bl.className = 'abbl';
      bl.innerHTML = html.replace(/\n/g, '<br>');
      d.appendChild(av);
      d.appendChild(bl);
      win.appendChild(d);
      win.scrollTop = win.scrollHeight;
    }

    function showDots() {
      var win = document.getElementById('awin');
      var d = document.createElement('div');
      d.id = 'adots';
      d.className = 'amsg b';
      d.innerHTML = '<div class="aav b">🤖</div><div class="abbl"><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
      win.appendChild(d);
      win.scrollTop = win.scrollHeight;
    }

    function hideDots() {
      var el = document.getElementById('adots');
      if (el) el.remove();
    }

    function getReply(txt) {
      var t = txt.toLowerCase();
      var isNew = ['einsteiger','anfänger','neu','keine ahnung','erste mal','womit','wo anfangen','beginner'].some(function(w){ return t.includes(w); });
      if (isNew) {
        return 'Perfekt für den Einstieg! 🎉 Starte hier:

→ <a href="lektion-01.html">🟢 Lektion 1: Richtig prompten</a> (15 Min)
→ <a href="lektion-02.html">🟢 Lektion 2: Meeting zusammenfassen</a> (5 Min)
→ <a href="lektion-11.html">🟢 Lektion 11: E-Mail Assistent</a> (10 Min)

Lektion 1 ist der beste Startpunkt – danach folgt alles andere!';
      }
      var scored = LL.map(function(l) {
        var s = l.k.filter(function(k){ return t.includes(k); }).length;
        return {l:l, s:s};
      }).filter(function(x){ return x.s > 0; }).sort(function(a,b){ return b.s - a.s; });

      if (scored.length === 0) {
        return 'Ich bin nicht ganz sicher welche Lektion am besten passt. Beschreib mir genauer was du tun möchtest – oder schau in die <a href="lektionen.html">Lektionen-Übersicht</a> und filtere nach deinem Level. 😊';
      }
      var top = scored.slice(0, 2).map(function(x){ return x.l; });
      var links = top.map(function(l){ return '→ <a href="'+l.u+'">'+l.tk+' Lektion '+l.id+': '+l.t+'</a> ('+l.tm+')'; }).join('
');
      return 'Das passt gut zu dir:

' + links + '

Darf ich noch etwas empfehlen?';
    }

    window.aDoSend = function() {
      if (busy) return;
      var inp = document.getElementById('ainp');
      var msg = inp.value.trim();
      if (!msg) return;
      document.getElementById('aqs').style.display = 'none';
      inp.value = '';
      addMsg('user', msg);
      busy = true;
      document.getElementById('asnd').disabled = true;
      showDots();
      setTimeout(function() {
        hideDots();
        addMsg('bot', getReply(msg));
        busy = false;
        document.getElementById('asnd').disabled = false;
        inp.focus();
      }, 700 + Math.random() * 500);
    };

    window.aSendQ = function(btn) {
      document.getElementById('ainp').value = btn.textContent;
      window.aDoSend();
    };
  })();
  </script>
