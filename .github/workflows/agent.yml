name: dotry.ai Food Trend Agent

on:
  schedule:
    # Jeden Montag um 8:00 Uhr UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Auch manuell startbar per Klick

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install feedparser anthropic

      - name: Zeige Dateistruktur (Debug)
        run: |
          echo "=== Repository Struktur ==="
          find . -name "*.py" -not -path "./.git/*"
          echo "=== Root Inhalt ==="
          ls -la

      - name: Agent starten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Suche run_agent.py automatisch
          if [ -f "run_agent.py" ]; then
            python3 run_agent.py
          elif [ -f "agent/run_agent.py" ]; then
            cd agent && python3 run_agent.py
          else
            echo "Suche run_agent.py..."
            AGENT=$(find . -name "run_agent.py" -not -path "./.git/*" | head -1)
            if [ -n "$AGENT" ]; then
              cd $(dirname $AGENT) && python3 run_agent.py
            else
              echo "❌ run_agent.py nicht gefunden!"
              exit 1
            fi
          fi

      - name: trends.json committen
        run: |
          git config user.name "dotry-agent"
          git config user.email "hi@dotry.ai"
          # Suche trends.json egal wo es liegt
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Weekly trends update $(date +'%Y-%m-%d')"
          git push
