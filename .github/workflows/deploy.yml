name: dotry.ai Deploy to Cloudflare

on:
  workflow_run:
    workflows: ["dotry.ai Food Trend Agent"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Node.js 24 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Wrangler installieren
        run: npm install -g wrangler

      - name: Zeige zu deployende Files
        run: |
          echo "=== Files ==="
          ls -la *.html *.css *.json 2>/dev/null || true

      - name: Auf Cloudflare Pages deployen
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler pages deploy . \
            --project-name=website-278 \
            --commit-dirty=true \
            --branch=main
